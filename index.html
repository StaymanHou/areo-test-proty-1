<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Flight Sim</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
      #app { width: 100vw; height: 100vh; display: block; }
      #splash {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0e16;
        color: #eee;
        font-family: sans-serif;
        z-index: 200;
        pointer-events: none;
      }
      #splash h1 { font-size: 2.5rem; margin: 0 0 0.5rem; letter-spacing: 0.05em; }
      #splash p.splash-tagline { font-size: 1rem; margin: 0 0 2rem; opacity: 0.7; }
      #splash #splash-stage { font-size: 0.95rem; opacity: 0.8; min-height: 1.2em; }
    </style>
  </head>
  <body>
    <div id="splash" data-testid="splash">
      <h1>Web Flight Sim</h1>
      <p class="splash-tagline">Open a URL. Be flying in 30 seconds.</p>
      <div id="splash-stage">Loading…</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
